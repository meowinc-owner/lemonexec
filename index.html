<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemon — Dev Choice Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #222222;
    --lemon: #d4f542;
    --lemon-dim: #a8c234;
    --text: #f0f0f0;
    --muted: #555;
    --danger: #f54242;
    --free: #42c97e;
    --paid: #f5a742;
    --verified: #42aaff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
  }

  header {
    grid-column: 1 / -1;
    padding: 28px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }

  .logo {
    width: 36px; height: 36px;
    background: var(--lemon);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px; color: #000;
  }

  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--lemon); }
  header p { margin-left: auto; font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  .panel-left { padding: 32px 40px; overflow-y: auto; border-right: 1px solid var(--border); }
  .panel-right { padding: 32px 40px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }

  .section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 16px; margin-top: 28px; display: flex; align-items: center; gap: 10px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-label:first-child { margin-top: 0; }

  .field { margin-bottom: 14px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #999; margin-bottom: 6px; }

  input, textarea, select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 10px 12px; outline: none;
  }
  input:focus, textarea:focus { border-color: var(--lemon); }

  .toggles { display: flex; gap: 8px; }
  .toggle-pill {
    padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border);
    font-size: 12px; font-weight: 600; cursor: pointer; background: transparent; color: #777;
  }
  .toggle-pill.active { background: var(--lemon); border-color: var(--lemon); color: #000; }

  /* COLLECTION LIST */
  .collection-list {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 10px;
  }

  .collection-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .collection-item:last-child { border-bottom: none; }
  .collection-item .name { font-weight: 600; color: var(--lemon); }
  .collection-item .creator { color: var(--muted); font-size: 11px; margin-left: 8px; }
  .collection-item button {
    background: transparent; border: none; color: var(--danger); cursor: pointer; font-weight: 800; padding: 4px;
  }

  .empty-state { padding: 20px; text-align: center; color: var(--muted); font-size: 12px; }

  /* PREVIEW CARD */
  .preview-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .preview-card-thumb { width: 100%; aspect-ratio: 16/9; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
  .preview-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .preview-card-body { padding: 14px 16px; }
  .preview-card-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .badge { font-weight: 700; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-right: 5px; }
  .badge.free { color: var(--free); }
  .badge.verified { color: var(--verified); }

  /* JSON OUTPUT */
  .json-box {
    background: #0d0d0d; border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    line-height: 1.7; color: #ccc; white-space: pre; overflow-x: auto;
  }
  .json-key { color: #42aaff; }
  .json-str { color: #a8e6cf; }

  .actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn-primary { flex: 1; padding: 13px; background: var(--lemon); color: #000; font-weight: 800; border: none; border-radius: 10px; cursor: pointer; }
  .btn-secondary { padding: 13px 20px; background: transparent; color: var(--text); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; }
  .copy-btn { padding: 4px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--lemon); cursor: pointer; font-size: 11px; }

  .tags-container { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .tag { padding: 4px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; font-size: 11px; display: flex; align-items: center; gap: 6px; }
  .tag button { background: none; border: none; cursor: pointer; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">L</div>
  <h1>Lemon <span>Dev Choice</span> Generator</h1>
  <p>multi-script collection builder</p>
</header>

<div class="panel-left">
  <div class="section-label">Script Details</div>
  <div class="field"><label>Script Name</label><input type="text" id="name" oninput="update()"></div>
  <div class="field"><label>Description</label><textarea id="desc" oninput="update()"></textarea></div>
  <div class="field" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
    <div><label>Creator</label><input type="text" id="creator" oninput="update()"></div>
    <div><label>Version</label><input type="text" id="version" placeholder="1.0.0" oninput="update()"></div>
  </div>
  <div class="field"><label>Thumbnail URL</label><input type="url" id="thumb" oninput="updateThumb()"></div>

  <div class="section-label">Flags</div>
  <div class="field" style="display:flex; flex-direction:column; gap:10px;">
    <div class="toggles">
      <button class="toggle-pill active" id="p-v-true" onclick="setPill('verified','true')">Verified</button>
      <button class="toggle-pill" id="p-v-false" onclick="setPill('verified','false')">Unverified</button>
    </div>
    <div class="toggles">
      <button class="toggle-pill active" id="p-f-true" onclick="setPill('free','true')">Free</button>
      <button class="toggle-pill" id="p-f-false" onclick="setPill('free','false')">Paid</button>
    </div>
  </div>

  <div class="section-label">Supported Games</div>
  <div class="tags-container" id="games-list"></div>
  <div style="display:flex; gap:8px;">
    <input type="text" id="game-input" placeholder="e.g. Jailbreak">
    <button class="btn-secondary" style="padding:8px 16px" onclick="addGame()">+ Add</button>
  </div>

  <div class="section-label">Execution</div>
  <div class="field"><label>Loadstring</label><textarea id="loadstring" style="min-height:80px;"></textarea></div>

  <div class="actions">
    <button class="btn-primary" onclick="addToCollection()">+ Add to Collection</button>
    <button class="btn-secondary" onclick="resetForm()">Clear Form</button>
  </div>
</div>

<div class="panel-right">
  <div class="section-label" style="margin-top:0">Manage Collection</div>
  <div class="collection-list" id="collection-ui">
    <div class="empty-state">No scripts added yet.</div>
  </div>

  <div class="section-label">Live Preview (Current Form)</div>
  <div class="preview-card">
    <div class="preview-card-thumb"><img id="preview-thumb" src="" style="display:none"><span id="ph">No Image</span></div>
    <div class="preview-card-body">
      <div class="preview-card-title" id="p-title">Untitled Script</div>
      <span class="badge free" id="b-free">Free</span>
      <span class="badge verified" id="b-ver">Verified</span>
    </div>
  </div>

  <div class="section-label" style="display:flex; justify-content:space-between">
    JSON Collection Array
    <button class="copy-btn" onclick="copyJSON()">Copy Collection</button>
  </div>
  <div class="json-box" id="json-out">[]</div>
</div>

<script>
  let collection = JSON.parse(localStorage.getItem('lemon_col') || '[]');
  let state = { verified: 'true', free: 'true', games: [] };

  function setPill(group, val) {
    state[group] = val;
    const prefix = group === 'verified' ? 'p-v-' : 'p-f-';
    document.getElementById(prefix+'true').classList.toggle('active', val === 'true');
    document.getElementById(prefix+'false').classList.toggle('active', val === 'false');
    update();
  }

  function addGame() {
    const val = document.getElementById('game-input').value.trim();
    if (val && !state.games.includes(val)) {
      state.games.push(val);
      document.getElementById('game-input').value = '';
      renderGames();
    }
  }

  function renderGames() {
    document.getElementById('games-list').innerHTML = state.games.map(g => 
      `<div class="tag">${g}<button onclick="state.games=state.games.filter(x=>x!=='${g}');renderGames()">×</button></div>`
    ).join('');
  }

  function update() {
    document.getElementById('p-title').textContent = document.getElementById('name').value || 'Untitled Script';
    document.getElementById('b-free').style.display = state.free === 'true' ? '' : 'none';
    document.getElementById('b-ver').style.display = state.verified === 'true' ? '' : 'none';
  }

  function updateThumb() {
    const url = document.getElementById('thumb').value;
    const img = document.getElementById('preview-thumb');
    const ph = document.getElementById('ph');
    if(url) { img.src = url; img.style.display = 'block'; ph.style.display = 'none'; }
    else { img.style.display = 'none'; ph.style.display = 'block'; }
  }

  function addToCollection() {
    const obj = {
      name: document.getElementById('name').value || "Unnamed Script",
      description: document.getElementById('desc').value,
      creator: document.getElementById('creator').value,
      version: document.getElementById('version').value || "1.0.0",
      thumbnail: document.getElementById('thumb').value,
      verified: state.verified === 'true',
      free: state.free === 'true',
      games: [...state.games],
      loadstring: document.getElementById('loadstring').value
    };
    collection.push(obj);
    saveAndRender();
    resetForm();
  }

  function removeScript(index) {
    collection.splice(index, 1);
    saveAndRender();
  }

  function saveAndRender() {
    localStorage.setItem('lemon_col', JSON.stringify(collection));
    const ui = document.getElementById('collection-ui');
    if (collection.length === 0) {
      ui.innerHTML = '<div class="empty-state">No scripts added yet.</div>';
    } else {
      ui.innerHTML = collection.map((s, i) => `
        <div class="collection-item">
          <div><span class="name">${s.name}</span><span class="creator">by ${s.creator || 'Unknown'}</span></div>
          <button onclick="removeScript(${i})">Remove</button>
        </div>
      `).join('');
    }
    
    const jsonStr = JSON.stringify(collection, null, 2);
    document.getElementById('json-out').innerHTML = jsonStr
      .replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span>:')
      .replace(/: "([^"]+)"/g, ': <span class="json-str">"$1"</span>');
  }

  function resetForm() {
    document.querySelectorAll('input, textarea').forEach(i => i.value = '');
    state.games = [];
    renderGames();
    update();
    updateThumb();
  }

  function copyJSON() {
    navigator.clipboard.writeText(JSON.stringify(collection, null, 2));
    alert('Collection copied to clipboard!');
  }

  saveAndRender();
</script>
</body>
</html>
