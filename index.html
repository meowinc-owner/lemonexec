<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemon — Dev Choice Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #222222;
    --lemon: #d4f542;
    --text: #f0f0f0;
    --muted: #555;
    --danger: #f54242;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; }

  header { grid-column: 1 / -1; padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; background: var(--surface); }
  .logo { width: 32px; height: 32px; background: var(--lemon); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #000; }
  header h1 { font-size: 18px; font-weight: 700; }

  .panel-left { padding: 30px 40px; overflow-y: auto; border-right: 1px solid var(--border); }
  .panel-right { padding: 30px 40px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }

  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 25px 0 15px; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-label:first-child { margin-top: 0; }

  .field { margin-bottom: 12px; }
  label { display: block; font-size: 11px; font-weight: 600; color: #777; margin-bottom: 6px; }

  input, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 10px; outline: none; }
  input:focus, textarea:focus { border-color: var(--lemon); }

  .toggles { display: flex; gap: 6px; margin-bottom: 10px; }
  .toggle-pill { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 11px; font-weight: 600; cursor: pointer; background: transparent; color: #555; font-family: 'Syne'; transition: 0.2s; }
  .toggle-pill.active { background: var(--lemon); border-color: var(--lemon); color: #000; }

  .collection-list { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; max-height: 180px; overflow-y: auto; }
  .collection-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .collection-item:last-child { border-bottom: none; }
  .collection-item .name { font-weight: 700; color: var(--lemon); }
  .collection-item button { background: transparent; border: none; color: var(--danger); cursor: pointer; font-size: 18px; line-height: 1; }

  .json-box { background: #080808; border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #aaa; white-space: pre; overflow-x: auto; line-height: 1.5; }
  .json-key { color: #569cd6; }
  .json-str { color: #ce9178; }
  .json-bool { color: #4fc1ff; }
  .json-comma { color: #ffffff; font-weight: bold; }

  .btn-primary { width: 100%; padding: 14px; background: var(--lemon); color: #000; font-weight: 800; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; font-family: 'Syne'; text-transform: uppercase; letter-spacing: 1px; }
  .btn-secondary { padding: 8px 12px; background: transparent; color: var(--text); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 12px; }

  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .tag { padding: 3px 8px; background: #222; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 5px; }
  .tag button { background: none; border: none; color: var(--danger); cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<header>
  <div class="logo">L</div>
  <h1>Lemon <span>Dev Choice</span> Generator</h1>
</header>

<div class="panel-left">
  <div class="section-label">Script Info</div>
  <div class="field"><label>Name</label><input type="text" id="name" placeholder="Infinite Yield"></div>
  <div class="field"><label>Description</label><textarea id="desc" placeholder="Description..."></textarea></div>
  <div class="field" style="display:grid; grid-template-columns: 2fr 1fr; gap:10px;">
    <div><label>Creator</label><input type="text" id="creator" placeholder="User"></div>
    <div><label>Version</label><input type="text" id="version" placeholder="1.0"></div>
  </div>
  <div class="field"><label>Thumbnail URL</label><input type="url" id="thumb" placeholder="https://..."></div>

  <div class="section-label">Attributes</div>
  <div class="toggles">
    <button class="toggle-pill active" id="p-v-true" onclick="setFlag('verified', true)">Verified: True</button>
    <button class="toggle-pill" id="p-v-false" onclick="setFlag('verified', false)">Verified: False</button>
  </div>
  <div class="toggles">
    <button class="toggle-pill active" id="p-f-true" onclick="setFlag('free', true)">Free: True</button>
    <button class="toggle-pill" id="p-f-false" onclick="setFlag('free', false)">Free: False</button>
  </div>
  <div class="toggles">
    <button class="toggle-pill" id="p-k-true" onclick="setFlag('keyRequired', true)">KeyRequired: True</button>
    <button class="toggle-pill active" id="p-k-false" onclick="setFlag('keyRequired', false)">KeyRequired: False</button>
  </div>

  <div class="section-label">Games</div>
  <div class="tags" id="games-list"></div>
  <div style="display:flex; gap:5px;"><input type="text" id="g-in" placeholder="Universal" onkeydown="if(event.key==='Enter')addGame()"><button class="btn-secondary" onclick="addGame()">+</button></div>

  <div class="section-label">Source</div>
  <div class="field"><label>Loadstring</label><textarea id="loadstring" style="min-height:60px;"></textarea></div>

  <button class="btn-primary" id="add-btn" onclick="addScript()">+ Add to Collection</button>
</div>

<div class="panel-right">
  <div class="section-label" style="margin-top:0; display:flex; justify-content:space-between">
    Manage Scripts
    <span onclick="clearCollection()" style="color:var(--danger); cursor:pointer; font-size:9px; letter-spacing:1px">CLEAR ALL</span>
  </div>
  <div class="collection-list" id="col-ui"><div style="padding:20px; color:#444; font-size:12px; text-align:center;">No scripts added.</div></div>

  <div class="section-label" style="display:flex; justify-content:space-between">
    JSON Objects (Comma Separated)
    <button class="btn-secondary" style="font-size:10px" onclick="copyJSON()">Copy All</button>
  </div>
  <div class="json-box" id="json-out">// Objects will appear here...</div>
</div>

<script>
  let collection = [];
  try {
    const saved = localStorage.getItem('lemon_col_v5');
    if (saved) collection = JSON.parse(saved);
  } catch(e) { collection = []; }

  let flags = { verified: true, free: true, keyRequired: false, games: [] };

  function setFlag(key, val) {
    flags[key] = val;
    const group = key === 'verified' ? 'v' : key === 'free' ? 'f' : 'k';
    document.getElementById(`p-${group}-true`).classList.toggle('active', val === true);
    document.getElementById(`p-${group}-false`).classList.toggle('active', val === false);
  }

  function addGame() {
    const v = document.getElementById('g-in').value.trim();
    if(v && !flags.games.includes(v)) { flags.games.push(v); document.getElementById('g-in').value = ''; renderGames(); }
  }

  function renderGames() {
    document.getElementById('games-list').innerHTML = flags.games.map(g => `<div class="tag">${g}<button onclick="flags.games=flags.games.filter(x=>x!=='${g}');renderGames()">×</button></div>`).join('');
  }

  function addScript() {
    const nameVal = document.getElementById('name').value.trim();
    if (!nameVal) { alert("Please enter a script name."); return; }

    const obj = {
      name: nameVal,
      description: document.getElementById('desc').value,
      creator: document.getElementById('creator').value,
      version: document.getElementById('version').value || "1.0",
      thumbnail: document.getElementById('thumb').value,
      verified: flags.verified,
      free: flags.free,
      keyRequired: flags.keyRequired,
      games: flags.games.length > 0 ? [...flags.games] : ["Universal"],
      loadstring: document.getElementById('loadstring').value
    };

    collection.push(obj);
    updateUI();
    reset();
  }

  function removeScript(i) { collection.splice(i, 1); updateUI(); }

  function clearCollection() {
    if(confirm("Delete all scripts in the current list?")) {
        collection = [];
        updateUI();
    }
  }

  function updateUI() {
    localStorage.setItem('lemon_col_v5', JSON.stringify(collection));
    const ui = document.getElementById('col-ui');
    ui.innerHTML = collection.length ? collection.map((s, i) => `<div class="collection-item"><span class="name">${s.name}</span><button onclick="removeScript(${i})">×</button></div>`).join('') : `<div style="padding:20px; color:#444; font-size:12px; text-align:center;">No scripts added.</div>`;
    
    if (collection.length === 0) {
        document.getElementById('json-out').innerHTML = "// Objects will appear here...";
        return;
    }

    const formatted = collection.map((item, index) => {
        let str = JSON.stringify(item, null, 2);
        if (index < collection.length - 1) str += ",";
        return str;
    }).join('\n\n');
    
    document.getElementById('json-out').innerHTML = formatted
      .replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span>:')
      .replace(/: "(.*?)"/g, ': <span class="json-str">"$1"</span>')
      .replace(/: (true|false)/g, ': <span class="json-bool">$1</span>')
      .replace(/},/g, '}<span class="json-comma">,</span>');
  }

  function reset() {
    document.getElementById('name').value = '';
    document.getElementById('desc').value = '';
    document.getElementById('creator').value = '';
    document.getElementById('version').value = '';
    document.getElementById('thumb').value = '';
    document.getElementById('loadstring').value = '';
    flags.games = []; 
    renderGames();
  }

  function copyJSON() {
    if(!collection.length) return;
    const raw = collection.map((item, index) => {
        let str = JSON.stringify(item, null, 2);
        if (index < collection.length - 1) str += ",";
        return str;
    }).join('\n\n');
    navigator.clipboard.writeText(raw);
    const btn = event.target; btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy All', 1500);
  }

  updateUI();
</script>
</body>
</html>
